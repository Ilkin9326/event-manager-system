<div class="modal-header">
  <h4 class="modal-title">{{ modalTitle }}</h4>
  <button type="button" class="btn-close"
          aria-label="Close"
          (click)="activeModal.dismiss('Cross click')">
  </button>
</div>

<div class="modal-body">
  @if (venueData.features?.length > 0) {
    <div class="list-group">
      @for (feature of venueData.features; track $index) {
        <a href="#" class="list-group-item list-group-item-action list-group-item-success">{{ $index + 1 }}
          . {{ feature }}</a>
      }
    </div>
  }
</div>
<hr>
<div class="modal-footer">
  <button type="button" class="btn btn-danger" (click)="activeModal.dismiss('Close click')">
    Bağla
  </button>
</div>
