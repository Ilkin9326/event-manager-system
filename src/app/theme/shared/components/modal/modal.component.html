<!-- Modal -->
<div class="modal" role="dialog" tabindex="-1" [ngStyle]="{'display':displayStyle}">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">{{textName}}</h1>
        <button type="button" class="btn-close" (click)="closePopup()" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="eventCategory">
          <div class="mb-3">
            <label for="category-az" class="col-form-label">Kateqoriya(Az):</label>
            <input type="text" class="form-control" id="category-az" formControlName="categoryAz">
            @if (!eventCategory.get('categoryAz').valid && eventCategory.get('categoryAz').touched) {
              <small id="subject" class="text-danger font-weight-bold">Başlıq seçilməyib(min: 5 simvol)
              </small>
            }
          </div>
          <div class="mb-3">
            <label for="category-en" class="col-form-label">Kateqoriya(En):</label>
            <input type="text" class="form-control" id="category-en" formControlName="categoryEn">
          </div>
          <div class="mb-3">
            <label for="category-ru" class="col-form-label">Kateqoriya(Ru):</label>
            <input type="text" class="form-control" id="category-ru" formControlName="categoryRu">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" (click)="closePopup()" id="closeModal">Bağla</button>
        @if (btnVisiblityUpdate){
        <button type="button" class="btn btn-primary" [disabled]="!eventCategory.valid" (click)="updateEventCategory()"> Dəyiş</button>
        } @else {
          <button type="button" class="btn btn-primary" (click)="postEventCategory()" [disabled]="!eventCategory.valid">Əlavə et</button>
        }

      </div>
    </div>
  </div>
</div>
