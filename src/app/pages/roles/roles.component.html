<div class="row">
  <div class="col-sm-12">
    <app-card cardTitle="{{title}}">
      <div class="d-flex justify-content-end mb-1"><button type="button" class="btn btn-primary" (click)="openPopup()">Yeni role</button></div>
      <app-role-modal [textName]="title"></app-role-modal>
      <table class="table table-bordered table-hover">
        <thead class="table-success">
        <tr>
          <th scope="col">№</th>
          <th scope="col">Adı-Az</th>
          <th scope="col">təsvir</th>
          <th scope="col" class="text-center">Actions</th>
        </tr>
        </thead>
        <tbody>
          @for (role of roles; track role.role_id) {
            <tr>
              <th scope="row">{{ $index + 1 }}</th>
              <td>{{role.title}}</td>
              <td>{{role.description}}</td>
              <td class="text-center">
                <a href="javascript:void(0)" (click)="updRole(role)" class="pe-auto" data-bs-toggle="modal" data-bs-target="#exampleModal">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-pencil-square text-warning font-weight" viewBox="0 0 16 16">
                    <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
                    <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
                  </svg>
                </a>
                &nbsp;
                &nbsp;
                &nbsp;
                <a href="javascript:void(0)" (click)="deleteRole(role.role_id)" class="pe-auto">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-trash text-danger font-weight"
                       viewBox="0 0 16 16">
                    <path
                      d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z" />
                    <path
                      d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z" />
                  </svg>
                </a>
              </td>
            </tr>
          } @empty {
            <tr>There are no items.</tr>
          }

        </tbody>
      </table>
    </app-card>
  </div>
</div>
