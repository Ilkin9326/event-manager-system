<app-card cardTitle="{{title}}">
  <div class="container mt-4">
    <div class="d-flex justify-content-end mb-1">
      <button class="btn btn-primary mb-3" (click)="openAdd()">
        <i class="ti ti-plus"></i> Yeni Otaq Əlavə Et
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover table-bordered">
        <thead class="table-success">
        <tr>
          <th>№</th>
          <th>Otaq Adı</th>
          <th>Bina</th>
          <th>Yerləşdiyi yer</th>
          <th>Tutum</th>
          <th class="text-center">Özəlliklər</th>
          <th>Qeyd</th>
          <th class="text-center" id="operation">Əməliyyatlar</th>
        </tr>
        </thead>
        <tbody>
          @for (venue of eventVenueServices.venues(); track $index) {
            <tr>
              <td>{{ $index + 1 }}</td>
              <td>{{ venue.name }}</td>
              <td>{{ venue.bina }}</td>
              <td>{{ venue.floor }}</td>
              <td>{{ venue.capacity }} nəfər</td>
              <td class="text-center">
                <button type="button" class="btn btn-outline-primary btn-sm" (click)="openViewModal(venue)">
                  <i class="ti ti-eye-check"></i>
                </button>
              </td>
              <td>{{ venue.notes }}</td>
              <td>
                <div class="d-flex gap-2 text-center">
                  <button class="btn btn-warning btn-sm mx-2" (click)="openEdit(venue)">
                    <i class="ti ti-pencil-up"></i>
                  </button>
                  <button class="btn btn-danger btn-sm" (click)="deleteRoom(venue.v_id)">
                    <i class="ti ti-trash"></i>
                  </button>
                </div>
              </td>
            </tr>

          } @empty {
            <tr>
              <td colspan="7" class="text-center text-muted">Otaq siyahısı boşdur.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>

  </div>

</app-card>
