<form [formGroup]="eventForm" (ngSubmit)="onSubmit()" class="p-3">

  <div class="d-flex align-items-center justify-content-between mb-4 pb-3 border-bottom">
    <div class="d-flex align-items-center gap-3">
      <button type="button" class="btn btn-outline-secondary btn-sm px-2 py-1">
        <i class="ti ti-arrow-left"></i>
      </button>
      <div>
        <div class="fw-semibold">Yeni tədbir əlavə et</div>
        <div class="text-muted" style="font-size:13px">Bütün məcburi sahələri doldurun</div>
      </div>
    </div>
  </div>

  <div class="row g-3">

    <div class="col-md-8">

      <div class="card border rounded-3 mb-3">
        <div class="card-header bg-light d-flex align-items-center gap-2 py-2">
          <span class="d-flex align-items-center justify-content-center rounded-2 bg-white border"
                style="width:28px;height:28px;">
            <i class="ti ti-calendar-event text-primary" style="font-size:13px;"></i>
          </span>
          <span class="fw-semibold">Tədbir məlumatları</span>
        </div>
        <div class="card-body p-3">

          <div class="mb-2">
            <label class="form-label text-muted mb-1" style="font-size:13px;">Tədbirin adı (AZ) <span
              class="text-danger">*</span></label>
            <input class="form-control"
                   placeholder="məs: Beynəlxalq Elm Konfransı 2025"
                   formControlName="titleAz">
          </div>

          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label text-muted mb-1" style="font-size:13px;">Title (EN)</label>
              <input class="form-control"
                     placeholder="International Conference"
                     formControlName="titleEn">
            </div>
            <div class="col-6">
              <label class="form-label text-muted mb-1" style="font-size:13px;">Название (RU)</label>
              <input class="form-control"
                     placeholder="Международная конференция"
                     formControlName="titleRu">
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label text-muted mb-1" style="font-size:13px;">Keçiriləcək zal <span class="text-danger">*</span></label>
            <select class="form-select" formControlName="vId">
              <option [ngValue]="null">Zal seçin...</option>
              @for (venue of eventVenueServis.venues(); track venue.v_id) {
                <option [ngValue]="venue.v_id">{{ venue.name }} — {{ venue.bina }}</option>
              }
            </select>
          </div>

          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label text-muted mb-1" style="font-size:13px;">Başlama vaxtı <span class="text-danger">*</span></label>
              <input type="datetime-local" class="form-control" formControlName="startTime">
            </div>
            <div class="col-6">
              <label class="form-label text-muted mb-1" style="font-size:13px;">Bitmə vaxtı</label>
              <input type="datetime-local" class="form-control" formControlName="endTime">
            </div>
          </div>

          <div>
            <label class="form-label text-muted mb-1" style="font-size:13px;">Gözlənilən iştirakçı sayı</label>
            <input type="number" class="form-control"
                   placeholder="0" min="0" max="2000"
                   formControlName="expectedAttendees">
          </div>

        </div>
      </div>


      <div class="card border rounded-3 mb-3">
        <div class="card-header bg-light d-flex align-items-center gap-2 py-2">
          <span class="d-flex align-items-center justify-content-center rounded-2 bg-white border"
                style="width:28px;height:28px;">
            <i class="ti ti-align-left text-success" style="font-size:13px;"></i>
          </span>
          <span class="fw-semibold small">Təsvir</span>
        </div>
        <div class="card-body p-3">
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label text-muted mb-1" style="font-size:11px;">Azərbaycan dilində</label>
              <textarea class="form-control" rows="3"
                        placeholder="Qısa məlumat..."
                        formControlName="descAz"></textarea>
            </div>
            <div class="col-6">
              <label class="form-label text-muted mb-1" style="font-size:11px;">In English</label>
              <textarea class="form-control" rows="3"
                        placeholder="Short description..."
                        formControlName="descEn"></textarea>
            </div>
          </div>
        </div>
      </div>


      <div class="card border rounded-3">
        <div class="card-header bg-light d-flex align-items-center gap-2 py-2">
          <span class="d-flex align-items-center justify-content-center rounded-2 bg-white border"
                style="width:28px;height:28px;">
            <i class="ti ti-adjustments text-primary" style="font-size:13px;"></i>
          </span>
          <span class="fw-semibold small">Əlavə parametrlər</span>
        </div>
        <div class="card-body p-3 d-flex flex-wrap gap-2">

          <input type="checkbox" class="btn-check" id="rector" formControlName="rectorAttendance">
          <label class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1" for="rector">
            <i class="ti ti-id-badge"></i> Rektor iştirak edir
          </label>

          <input type="checkbox" class="btn-check" id="poster" formControlName="hasPoster">
          <label class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1" for="poster">
            <i class="ti ti-photo"></i> Poster paylaşılacaq
          </label>

          <input type="checkbox" class="btn-check" id="online" formControlName="isOnline">
          <label class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1" for="online">
            <i class="ti ti-broadcast"></i> Online yayım
          </label>

        </div>
      </div>

    </div>

    <div class="col-md-4">
      <app-it-support-selector
        (selectionChange)="onItSelectionChange($event)">
      </app-it-support-selector>

      <div class="alert alert-light border d-flex align-items-start gap-2 mb-0" role="alert">
        <i class="ti ti-users text-succss mt-1"></i>
        <span class="text-success">Qonaq siyahısı tədbir yaradıldıqdan sonra əlavə edilə bilər</span>
      </div>

    </div>

  </div>

  <div class="row g-2 mt-3 pt-3 border-top">
    <div class="col-6">
      <button type="button"
              class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2"
              [disabled]="isSaving"
              (click)="saveDraft()">
        <i class="ti ti-device-floppy"></i>
        {{ isSaving ? 'Saxlanır...' : 'Draft kimi saxla' }}
      </button>
    </div>
    <div class="col-6">
      <button type="submit"
              class="btn btn-dark w-100 d-flex align-items-center justify-content-center gap-2"
              [disabled]="eventForm.invalid || isSaving">
        <i class="ti ti-check"></i>
        {{ isSaving ? 'Saxlanır...' : 'Tədbiri yadda saxla' }}
      </button>
    </div>
  </div>

</form>
